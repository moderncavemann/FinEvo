name: Verified memory CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python 3.12.7 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_INPUT: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONHASHSEED: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/verified-memory-ci.yml

      - name: Check patch whitespace
        if: runner.os == 'Linux'
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git show --check --format= --no-renames HEAD
          zero_sha=0000000000000000000000000000000000000000
          if [[ -n "${EVENT_BASE_SHA:-}" && "${EVENT_BASE_SHA}" != "${zero_sha}" ]] \
            && git cat-file -e "${EVENT_BASE_SHA}^{commit}" 2>/dev/null; then
            # The branch contains byte-preserved historical CSV/JSON fixtures
            # with legacy CRLF/trailing whitespace. Check the accumulated PR
            # source/document patch without rewriting those evidence bytes;
            # HEAD itself is still checked across every path above.
            git diff --check "${EVENT_BASE_SHA}...HEAD" -- \
              '*.py' '*.md' '*.tex' '*.yml' '*.yaml' '*.toml' '*.sh' \
              ':(exclude)artifacts/**'
          fi

      - name: Re-hash six tracked sealed manifests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import subprocess

          from verified_memory.artifacts import verify_manifest

          expected = {
              "artifacts/verified_replays/g4b-agent0-t5/manifest.json":
                  "366d262e494cf1bb1a09f822453f085b3b00c7a070ad5deb64bba4fa2c8fa64d",
              "artifacts/verified_replays/g4b-agent0-t5-v2/manifest.json":
                  "39d9352b9ec39439240c930ea62a59670f721331e9982d01718f510ed42ae1f6",
              "artifacts/verified_replays/g4b-agent0-t5-v3/manifest.json":
                  "5b4772d46f1fd124fca78f4b5572de034ae2629e09ff01f031939256ddbee651",
              "artifacts/verified_runs/g0-local-s11/manifest.json":
                  "d4aadb1d212dc197aa2001d82023627185784bc3b4ff477715cd96a88232f44d",
              "artifacts/verified_runs/g4-api-gpt52-s11/manifest.json":
                  "c49330b0daeb6bfefdd0005fe7ae70bef478e20b99858eea42f9a2da5bb40814",
              "artifacts/verified_runs/g4b-api-gpt52-s11/manifest.json":
                  "aa45a372e89fa901ac1abbc119f1123f6f009e17583b993bbb1ce07437a2ed94",
          }
          tracked = {
              line
              for line in subprocess.check_output(
                  [
                      "git",
                      "ls-files",
                      "--",
                      "artifacts/verified_replays/*/manifest.json",
                      "artifacts/verified_runs/*/manifest.json",
                  ],
                  text=True,
              ).splitlines()
              if line
          }
          if tracked != set(expected):
              missing = sorted(set(expected) - tracked)
              unexpected = sorted(tracked - set(expected))
              raise SystemExit(
                  "sealed manifest inventory mismatch: "
                  f"missing={missing}, unexpected={unexpected}"
              )

          for relative, expected_sha256 in expected.items():
              manifest = Path(relative)
              result = verify_manifest(manifest.parent)
              if result.manifest_sha256 != expected_sha256:
                  raise SystemExit(
                      f"trusted manifest anchor changed for {relative}: "
                      f"expected={expected_sha256}, got={result.manifest_sha256}"
                  )
              print(
                  f"verified {relative}: artifacts={result.artifact_count} "
                  f"sha256={result.manifest_sha256}"
              )
          PY

      - name: Scan tracked files for high-confidence secrets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          rules = {
              "private-key": re.compile(
                  rb"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"
              ),
              "aws-access-key": re.compile(rb"\b(?:AKIA|ASIA)[0-9A-Z]{16}\b"),
              "google-api-key": re.compile(rb"\bAIza[0-9A-Za-z_-]{35}\b"),
              "github-token": re.compile(
                  rb"\b(?:gh[pousr]_[A-Za-z0-9]{36,255}|"
                  rb"github_pat_[A-Za-z0-9_]{40,255})\b"
              ),
              "provider-api-key": re.compile(
                  rb"\bsk-(?:proj-|svcacct-|ant-api\d{2}-)?[A-Za-z0-9_-]{20,}\b"
              ),
          }
          tracked = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          findings = []
          for raw_path in tracked:
              if not raw_path:
                  continue
              path = Path(raw_path.decode("utf-8"))
              data = path.read_bytes()
              if b"\0" in data:
                  continue
              for label, pattern in rules.items():
                  for match in pattern.finditer(data):
                      line = data.count(b"\n", 0, match.start()) + 1
                      findings.append((path.as_posix(), line, label))

          if findings:
              for path, line, label in findings:
                  # Deliberately report location and rule only, never secret material.
                  print(f"{path}:{line}: possible {label}")
              raise SystemExit(f"found {len(findings)} high-confidence secret candidate(s)")
          print(f"scanned {len(tracked) - 1} tracked files; no high-confidence secrets found")
          PY

      - name: Install test dependencies
        run: |
          python -m pip install \
            --requirement requirements.txt \
            --only-binary=:all: \
            numpy==2.5.1 \
            pyyaml==6.0.3 \
            python-dateutil==2.9.0.post0 \
            fire==0.7.1 \
            requests==2.34.2 \
            openai==2.46.0 \
            google-generativeai==0.8.6 \
            pytest==8.4.2 \
            lz4==4.4.4

      - name: Check dependency consistency
        run: python -m pip check

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Compile tracked Python sources
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/compile-cache
        run: |
          python - <<'PY'
          import compileall
          from pathlib import Path
          import subprocess

          tracked = subprocess.check_output(
              ["git", "ls-files", "-z", "--", "*.py"]
          ).split(b"\0")
          sources = [Path(raw.decode("utf-8")) for raw in tracked if raw]
          failures = [
              path.as_posix()
              for path in sources
              if not compileall.compile_file(path, force=True, quiet=1)
          ]
          if failures:
              raise SystemExit(f"compileall failed: {failures}")
          print(f"compileall verified {len(sources)} tracked Python files")
          PY

      - name: Verify outbound-network deny guard for G0
        env:
          PYTHONPATH: ${{ github.workspace }}/.github/network_guard
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import socket

          try:
              socket.create_connection(("127.0.0.1", 9), timeout=0.01)
          except RuntimeError as exc:
              if "outbound network is disabled" not in str(exc):
                  raise
          else:
              raise SystemExit("outbound-network deny guard did not activate")
          print("outbound-network deny guard is active")
          PY

      - name: Run deterministic local G0 twice
        shell: bash
        run: |
          set -euo pipefail
          for replica in a b; do
            env \
              -u OPENAI_API_KEY \
              -u GEMINI_API_KEY \
              -u OPENROUTER_API_KEY \
              PYTHONPATH="${GITHUB_WORKSPACE}/.github/network_guard${PYTHONPATH:+:${PYTHONPATH}}" \
              python simulate_verified.py \
                --provider diagnostic \
                --model scripted-v1 \
                --run-id ci-g0-s11 \
                --seed 11 \
                --num-agents 2 \
                --episode-length 6 \
                --workers 2 \
                --max-retries 1 \
                --output-dir "${RUNNER_TEMP}/g0-${replica}" \
                >"${RUNNER_TEMP}/g0-${replica}.stdout.json"
          done

      - name: Verify G0 manifests and deterministic outputs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from verified_memory.artifacts import verify_manifest

          temp = Path(os.environ["RUNNER_TEMP"])
          roots = (temp / "g0-a", temp / "g0-b")
          for root in roots:
              result = verify_manifest(root)
              provenance = json.loads((root / "provenance.json").read_text())
              keys = provenance["details"]["environment_keys_present"]
              if any(keys.values()):
                  raise SystemExit(f"G0 unexpectedly observed an API key: {sorted(keys)}")
              print(
                  f"verified {root.name}: artifacts={result.artifact_count} "
                  f"sha256={result.manifest_sha256}"
              )

          deterministic_streams = (
              "actions.jsonl",
              "context_trace.jsonl",
              "decision_snapshots.jsonl",
              "episodes.jsonl",
              "macro_steps.jsonl",
              "utility_ledger.jsonl",
          )
          for stream in deterministic_streams:
              first = (roots[0] / "streams" / stream).read_bytes()
              second = (roots[1] / "streams" / stream).read_bytes()
              if first != second:
                  raise SystemExit(f"G0 deterministic stream mismatch: {stream}")

          # Semantic streams are intentionally optional: a valid fail-closed run
          # may produce proposals/errors but zero accepted rules or rule events.
          optional_streams = (
              "errors.jsonl",
              "semantic_proposals.jsonl",
              "semantic_rule_events.jsonl",
              "semantic_rules.jsonl",
          )
          for stream in optional_streams:
              paths = tuple(root / "streams" / stream for root in roots)
              if paths[0].exists() != paths[1].exists():
                  raise SystemExit(f"G0 optional stream presence mismatch: {stream}")
              if paths[0].exists() and paths[0].read_bytes() != paths[1].read_bytes():
                  raise SystemExit(f"G0 optional stream mismatch: {stream}")

          summaries = []
          for root in roots:
              summary = json.loads((root / "streams" / "summary.jsonl").read_text())
              # Provider latency and wall-clock budget fields are observability data,
              # not deterministic simulation state.
              summary.pop("api")
              summaries.append(summary)
          if summaries[0] != summaries[1]:
              raise SystemExit("G0 deterministic summary fields differ")
          if summaries[0]["validation"]["status"] != "pass":
              raise SystemExit("G0 validation did not pass")
          if not summaries[0]["diagnostic_only"] or summaries[0]["scientific_evidence"]:
              raise SystemExit("G0 evidence scope changed unexpectedly")
          memory = summaries[0]["memory_diagnostics"]
          if memory["semantic_candidate_parse"] != {
              "attempt_count": 2,
              "success_count": 2,
              "failure_count": 0,
              "failure_rate": 0.0,
              "mode_counts": {
                  "exact_json": 2,
                  "fenced_recovery": 0,
                  "substring_recovery": 0,
                  "parse_failure": 0,
              },
          }:
              raise SystemExit("G0 scripted semantic proposal contract changed")
          if memory["semantic_rule_status_counts"] != {
              "provisional": 0,
              "active": 2,
              "rejected": 0,
              "retired": 0,
          }:
              raise SystemExit("G0 did not finish with the two expected active rules")
          if memory["active_rule_retrieval_count"] <= 0:
              raise SystemExit("G0 never retrieved an active semantic rule")
          print("G0 deterministic outputs match across two sealed runs")
          PY

      - name: Ensure checks did not mutate tracked files
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --exit-code
          status=$(git status --porcelain=v1 --untracked-files=all)
          if [[ -n "${status}" ]]; then
            printf '%s\n' "checks left the checkout dirty:" "${status}"
            exit 1
          fi
